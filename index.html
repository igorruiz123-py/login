<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" type="image/png" href="assets/user_auth.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <section class="sign-in">
            <div class="sign-in-content">
                <header>
                    <h1 id="welcome-back">Welcome Back!</h1>
                </header>
                <p id="paragraph-welcome-back">To keep connected with us, please login with your personal info</p>
                <form>
                    <label>
                        <button id="button" name="button">SIGN IN</button>
                    </label>
                </form>
            </div>
        </section>
        <section class="sign-up">
                <div class="sign-up-content">
                    <form>
                        <section>
                            <header>
                                <h1 id="title-create-account">Create Account</h1>
                            </header>
                            <p id="create-account-paragraph">Use your e-mail for registration</p>
                            <div class="registration">
                                <label>
                                    <div class="name">
                                        <i class="fa-solid fa-user"></i>
                                        <input id="name-input" type="text" placeholder="Name" name="name-input">
                                    </div>
                                    <div class="email">
                                        <i class="fa-solid fa-at"></i>
                                        <input id="email-input" type="text" placeholder="E-mail" name="email-input">
                                    </div>
                                    <div class="password">
                                        <i class="fa-solid fa-unlock"></i>
                                        <input id="password-input" type="password" placeholder="Password" name="password-input">
                                    </div>
                                </label>
                                <button id="button">SIGN UP</button>
                            </div>
                        </section>
                    </form>
                </div>
        </section>
    </main>
</body>
</html>
